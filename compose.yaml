# =============================================================================
# WorthIT — base stack (production-ready; homelab deploy uses compose.prod.yaml)
# =============================================================================
#
# Local dev with hot reload:  make dev  (adds compose.dev.yaml)
# Homelab deploy:             scripts/deploy.sh  (adds compose.prod.yaml)
# =============================================================================

services:
  db:
    image: postgres:16-alpine
    container_name: ${APP_NAME:-worthit}-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-worthit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-worthit}
      POSTGRES_DB: ${POSTGRES_DB:-worthit}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-worthit} -d ${POSTGRES_DB:-worthit}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  api:
    build: .
    container_name: ${APP_NAME:-worthit}-api
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8000}:${APP_PORT:-8000}"
    environment:
      APP_PORT: ${APP_PORT:-8000}
      HEALTH_PATH: ${HEALTH_PATH:-/health}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-worthit}:${POSTGRES_PASSWORD:-worthit}@db:5432/${POSTGRES_DB:-worthit}
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    command:
      [
        "uv",
        "run",
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "${APP_PORT:-8000}",
      ]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:$$APP_PORT$$HEALTH_PATH >/dev/null || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  web:
    build:
      context: ./frontend
      target: prod
    image: worthit-web-prod
    container_name: ${APP_NAME:-worthit}-web
    restart: unless-stopped
    ports:
      - "${WEB_HOST_PORT:-3050}:3050"
    environment:
      PORT: "3050"
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://homelab:8000}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3050/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:
  web_node_modules:
