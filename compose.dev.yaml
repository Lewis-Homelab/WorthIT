# Local dev overrides — hot reload. Used by: make dev

services:
  api:
    volumes:
      - ./app:/app/app
      # Mount local parquet datasets so recommendations work in Docker.
      - ./data:/app/data:ro
    environment:
      DATA_DIR: /app/data
    command:
      [
        "uv",
        "run",
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "${APP_PORT:-8000}",
        "--reload",
      ]

  web:
    build:
      context: ./frontend
      target: dev
    image: worthit-web-dev
    environment:
      WATCHPACK_POLLING: "true"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://homelab:8000}
    volumes:
      - ./frontend:/app
      - web_node_modules:/app/node_modules
